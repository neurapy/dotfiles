general {
    border_size = 1
    #no_border_on_floating = false
    gaps_in = 1
    gaps_out = 0
    #float_gaps = 0
    #gaps_workspaces = 0
    #col.inactive_border = 0xff444444
    col.active_border = 0xffffffff
    #col.nogroup_border = 0xffffaaff
    #col.nogroup_border_active = 0xffff00ff
    #layout = dwindle         # [dwindle/master]
    #no_focus_fallback = false
    #resize_on_border = false
    #extend_border_grab_area = 15
    #hover_icon_on_border = true
    #allow_tearing = false
    #resize_corner = 0        # 1-4 from top-left clockwise, 0=disable
    #modal_parent_blocking = true

    snap {
        #enabled = false
        #window_gap = 10
        #monitor_gap = 10
        #border_overlap = false
        #respect_gaps = false
    }
}

decoration {
    rounding = 0
    #rounding_power = 2.0       # 1.0–10.0
    #active_opacity = 1.0       # 0.0–1.0
    #inactive_opacity = 1.0     # 0.0–1.0
    #fullscreen_opacity = 1.0   # 0.0–1.0
    #dim_modal = true
    #dim_inactive = false
    #dim_strength = 0.5         # 0.0–1.0
    dim_special = 0.0          # 0.0–1.0
    #dim_around = 0.4           # 0.0–1.0
    #screen_shader = [[Empty]]
    #border_part_of_window = true

    blur {
        enabled = true
        #size = 8
        #passes = 1
        #ignore_opacity = true
        #new_optimizations = true
        #xray = false
        #noise = 0.0117
        #contrast = 0.8916
        #brightness = 0.8172
        #vibrancy = 0.1696
        #vibrancy_darkness = 0.0
        special = true
        #popups = false
        #popups_ignorealpha = 0.2
        #input_methods = false
        #input_methods_ignorealpha = 0.2
    }

    shadow {
        #enabled = true
        #range = 4
        #render_power = 3        # 1–4
        #sharp = false
        #ignore_window = true
        #color = 0xee1a1a1a
        #color_inactive = unset
        #offset = 0 0            # vec2
        #scale = 1.0             # 0.0–1.0
    }
}

animations {
    #enabled = true
    #workspace_wraparound = false
}

group {
    #auto_group = true
    #insert_after_current = true
    #focus_removed_window = true
    #drag_into_group = 1                     # 0/1/2
    #merge_groups_on_drag = true
    #merge_groups_on_groupbar = true
    #merge_floated_into_tiled_on_groupbar = false
    #group_on_movetoworkspace = false
    #col.border_active = 0x66ffff00
    #col.border_inactive = 0x66777700
    #col.border_locked_active = 0x66ff5500
    #col.border_locked_inactive = 0x66775500

    groupbar {
        #enabled = true
        #font_family = [[Empty]]
        #font_size = 8
        #font_weight_active = normal
        #font_weight_inactive = normal
        #gradients = false
        #height = 14
        #indicator_gap = 0
        #indicator_height = 3
        #stacked = false
        #priority = 3
        #render_titles = true
        #text_offset = 0
        #scrolling = true
        #rounding = 1
        #rounding_power = 2.0            # 1.0–10.0
        #gradient_rounding = 2
        #gradient_rounding_power = 2.0   # 1.0–10.0
        #round_only_edges = true
        #gradient_round_only_edges = true
        #text_color = 0xffffffff
        #text_color_inactive = unset
        #text_color_locked_active = unset
        #text_color_locked_inactive = unset
        #col.active = 0x66ffff00
        #col.inactive = 0x66777700
        #col.locked_active = 0x66ff5500
        #col.locked_inactive = 0x66775500
        #gaps_in = 2
        #gaps_out = 2
        #keep_upper_gap = true
        #blur = false
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    #disable_scale_notification = false
    #col.splash = 0xffffffff
    #font_family = Sans
    #splash_font_family = [[Empty]]
    force_default_wallpaper = 0     # -1/0/1/2
    #vfr = true
    #vrr = 0                          # 0/1/2/3
    #mouse_move_enables_dpms = false
    #key_press_enables_dpms = false
    #name_vk_after_proc = true
    #always_follow_on_dnd = true
    #layers_hog_keyboard_focus = true
    #animate_manual_resizes = false
    #animate_mouse_windowdragging = false
    #disable_autoreload = false
    #enable_swallow = false
    #swallow_regex = [[Empty]]
    #swallow_exception_regex = [[Empty]]
    #focus_on_activate = false
    #mouse_move_focuses_monitor = true
    #allow_session_lock_restore = false
    #session_lock_xray = false
    #background_color = 0x111111
    #close_special_on_empty = true
    #new_window_takes_over_fullscreen = 0   # 0/1/2
    #exit_window_retains_fullscreen = false
    #initial_workspace_tracking = 1         # 0/1/2
    #middle_click_paste = true
    #render_unfocused_fps = 15
    #disable_xdg_env_checks = false
    #disable_hyprland_qtutils_check = false
    #lockdead_screen_delay = 1000
    #enable_anr_dialog = true
    #anr_missed_pings = 5
    #size_limits_tiled = false
}

cursor {
    #invisible = false
    #sync_gsettings_theme = true
    #no_hardware_cursors = 2          # 0/1/2
    #no_break_fs_vrr = 2              # 0/1/2
    #min_refresh_rate = 24
    #hotspot_padding = 1
    #inactive_timeout = 0             # seconds
    #no_warps = false
    #persistent_warps = false
    #warp_on_change_workspace = 0     # 0/1/2
    #warp_on_toggle_special = 0       # 0/1/2
    #zoom_factor = 1.0
    #zoom_rigid = false
    #enable_hyprcursor = true
    #hide_on_key_press = false
    #hide_on_touch = true
    #use_cpu_buffer = 2               # 0/1/2
    #warp_back_after_non_mouse_input = false
    #zoom_disable_aa = false
}
