##############################################
# INPUT (GLOBAL)
##############################################

input {
    kb_model = pc105
    kb_layout = de
    kb_variant = us
    #kb_options = [[Empty]]
    #kb_rules = [[Empty]]
    #kb_file = [[Empty]]
    numlock_by_default = true
    #resolve_binds_by_sym = false
    repeat_rate = 30
    repeat_delay = 300
    #sensitivity = 0.0
    #accel_profile = [[Empty]]     # adaptive/flat/custom
    #force_no_accel = false
    #rotation = 0
    #left_handed = false
    #scroll_points = [[Empty]]
    #scroll_method = [[Empty]]     # 2fg/edge/on_button_down/no_scroll
    #scroll_button = 0
    #scroll_button_lock = false
    #scroll_factor = 1.0
    #natural_scroll = false
    #follow_mouse = 1              # 0/1/2/3
    #follow_mouse_threshold = 0.0
    #focus_on_close = 0            # 0/1
    #mouse_refocus = true
    #float_switch_override_focus = 1
    #special_fallthrough = false
    #off_window_axis_events = 1    # 0/1/2/3
    #emulate_discrete_scroll = 1   # 0/1/2

    ##########################################
    # TOUCHPAD (input:touchpad)
    ##########################################
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 0.4
        #middle_button_emulation = false
        #tap_button_map = [[Empty]]    # lrm/lmr
        #clickfinger_behavior = false
        #tap-to-click = true
        #drag_lock = 0                 # 0/1/2
        #tap-and-drag = true
        #flip_x = false
        #flip_y = false
        #drag_3fg = 0                 # 0/1/2
    }

    ##########################################
    # TOUCHDEVICE (input:touchdevice)
    ##########################################
    touchdevice {
        #transform = -1
        #output = [[Auto]]     # auto-detect when unset
        #enabled = true
    }

    ##########################################
    # VIRTUAL KEYBOARD (input:virtualkeyboard)
    ##########################################
    virtualkeyboard {
        #share_states = 2          # 0/1/2
        #release_pressed_on_close = false
    }

    ##########################################
    # TABLET (input:tablet)
    ##########################################
    tablet {
        #transform = -1
        #output = [[Empty]]
        #region_position = 0 0
        #absolute_region_position = false
        #region_size = 0 0
        #relative_input = false
        #left_handed = false
        #active_area_size = 0 0
        #active_area_position = 0 0
    }
}

binds {
    #pass_mouse_when_bound = false
    #scroll_event_delay = 300
    #workspace_back_and_forth = false
    #hide_special_on_workspace_change = false
    #allow_workspace_cycles = false
    #workspace_center_on = 0              # 0/1
    #focus_preferred_method = 0           # 0/1
    #ignore_group_lock = false
    #movefocus_cycles_fullscreen = false
    #movefocus_cycles_groupfirst = false
    #disable_keybind_grabbing = false
    #window_direction_monitor_fallback = true
    #allow_pin_fullscreen = false
    #drag_threshold = 0
}


##############################################
# GESTURES (gestures:)
##############################################

gestures {
    workspace_swipe_distance = 350
    #workspace_swipe_touch = false
    #workspace_swipe_invert = true
    #workspace_swipe_touch_invert = false
    workspace_swipe_min_speed_to_force = 25
    workspace_swipe_cancel_ratio = 0.25
    workspace_swipe_create_new = true
    #workspace_swipe_direction_lock = true
    #workspace_swipe_direction_lock_threshold = 10
    #workspace_swipe_forever = false
    #workspace_swipe_use_r = false
    #close_max_timeout = 1000
}

# Scroll nicely in the termin0l
windowrule = scroll_touchpad 1.5, match:class (Alacritty|kitty)
windowrule = scroll_touchpad 0.2, match:class com.mitchellh.ghostty
